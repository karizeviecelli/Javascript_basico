<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Filmes Favoritos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="container">
        <h1>🚀 Cadastro de Filmes</h1>
        
        <form id="form-filme" class="formulario">
            <div class="campo">
                <label for="titulo">Nome do Filme:</label>
                <input type="text" id="titulo" placeholder="Ex: Vingadores">
            </div>

            <div class="campo">
                <label for="genero">Gênero:</label>
                <input type="text" id="genero" placeholder="Ex: Ação">
            </div>

            <div class="campo">
                <label for="ano">Ano de Lançamento:</label>
                <input type="number" id="ano" placeholder="Ex: 2019">
            </div>

            <button type="submit" id="btn-cadastrar">Cadastrar Filme</button>
        </form>

        <hr>

        <h2>🎬 Meus Filmes</h2>
        <div id="lista-filmes" class="lista-cards"></div>
    </main>

    <script src="script/script.js"></script>
</body>
</html>
